<!-- core/templates/core/register.html -->
<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Регистрация — Автомагазин</title>
</head>

<body>
    <h1>Регистрация</h1>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{% url 'core:register' %}">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Зарегистрироваться</button>
    </form>

    <p>Уже есть аккаунт? <a href="{% url 'core:login' %}">Войти</a></p>
    <p><a href="{% url 'core:home' %}">На главную</a></p>
</body>

</html>
