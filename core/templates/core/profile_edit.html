{% extends 'base.html' %}

{% block title %}Редактирование профиля — Автомагазин{% endblock %}

{% block breadcrumbs %}
<div class="breadcrumbs">
    <a href="{% url 'core:home' %}">Главная</a>
    <span>→</span>
    <a href="{% url 'core:profile' %}">Личный кабинет</a>
    <span>→</span>
    <span>Редактирование</span>
</div>
{% endblock %}

{% block content %}
<h1>Редактирование профиля</h1>

<form method="post" style="max-width: 500px; margin-top: 20px;">
    {% csrf_token %}
    {{ form.as_p }}
    <div style="display: flex; gap: 15px; margin-top: 20px;">
        <button type="submit" class="btn btn-success">Сохранить</button>
        <a href="{% url 'core:profile' %}" class="btn btn-secondary">Отмена</a>
    </div>
</form>
{% endblock %}
