{% extends 'base.html' %}

{% block title %}Вход — Автомагазин{% endblock %}

{% block breadcrumbs %}
<div class="breadcrumbs">
    <a href="{% url 'core:home' %}">Главная</a>
    <span>→</span>
    <span>Вход</span>
</div>
{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h1>Вход в личный кабинет</h1>

    <form method="post" action="{% url 'core:login' %}" style="margin-top: 20px;">
        {% csrf_token %}

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">
                Имя пользователя:
            </label>
            <input type="text" name="username" required
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">
                Пароль:
            </label>
            <input type="password" name="password" required
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px;">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px;">
            Войти
        </button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <p>Нет аккаунта? <a href="{% url 'core:register' %}">Зарегистрироваться</a></p>
        <p><a href="{% url 'core:home' %}">← На главную</a></p>
    </div>
</div>
{% endblock %}
