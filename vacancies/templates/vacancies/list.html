<!DOCTYPE html>
<html>

<head>
    <title>Вакансии</title>
</head>

<body>
    <h1>Вакансии</h1>
    {% for vacancy in vacancies %}
    <div>
        <h2>{{ vacancy.title }}</h2>
        <p>Зарплата: {{ vacancy.salary }}</p>
        <p>Требования: {{ vacancy.requirements }}</p>
        <p>Условия: {{ vacancy.conditions }}</p>
        <p>{{ vacancy.description }}</p>
    </div>
    {% endfor %}
</body>

</html>
