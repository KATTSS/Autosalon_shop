<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Добавить отзыв — Автомагазин</title>
</head>

<body>
    <h1>Добавить отзыв</h1>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% if user.is_authenticated %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Отправить отзыв</button>
    </form>
    {% else %}
    <p>Чтобы оставить отзыв, <a href="{% url 'core:login' %}">войдите</a> или <a
            href="{% url 'core:register' %}">зарегистрируйтесь</a>.</p>
    {% endif %}

    <p><a href="{% url 'reviews:list' %}">← К списку отзывов</a></p>
</body>

</html>
